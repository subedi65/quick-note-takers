<!DOCTYPE html>
<html>

<head>

    <title>Quick Note Taker test git</title>
    <style>
        body {
            font-family: system-ui;
            padding: 20px;
            background: #f4f4f4;
        }
        textarea {
            width: 95%;
            height: 60vh;
            font-size: 18px;
            padding: 15px;

        button {

            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

<body>
    <h1>📝Quick Note Taker</h1>
    <br>
    <p id="save_status" style="font-size: 14px; color: #666;">Auto save status</p>
